syntax = "proto3";

import "google/protobuf/empty.proto";

message SetThemeRequest {
  string theme = 1;
}

message WindowState {
  bool isMaximized = 1;
}

message SelectDirectoryRequest {
  string title = 1;
  string default_path = 2;
}

message SelectDirectoryResponse {
  bool canceled = 1;
  string path = 2;
  string error_message = 3;
}

message SelectFilesRequest {
  string title = 1;
  string default_path = 2;
}

message SelectFilesResponse {
  bool canceled = 1;
  repeated string paths = 2;
  string error_message = 3;
}

message AnnotationProject {
  string id = 1;
  string name = 2;
  string root_dir = 3;
  string created_at = 4;
  string updated_at = 5;
}

message AnnotationRecord {
  string id = 1;
  string project_id = 2;
  string image_path = 3;
  string label = 4;
  string bbox_json = 5;
  string meta_json = 6;
  string updated_at = 7;
}

message ListAnnotationProjectsRequest {
  string database_dir = 1;
}

message ListAnnotationProjectsResponse {
  repeated AnnotationProject projects = 1;
}

message UpsertAnnotationProjectRequest {
  string database_dir = 1;
  AnnotationProject project = 2;
}

message DeleteAnnotationProjectRequest {
  string database_dir = 1;
  string id = 2;
}

message ListAnnotationsByProjectRequest {
  string database_dir = 1;
  string project_id = 2;
}

message ListAnnotationsResponse {
  repeated AnnotationRecord annotations = 1;
}

message UpsertAnnotationRequest {
  string database_dir = 1;
  AnnotationRecord annotation = 2;
}

message DeleteAnnotationRequest {
  string database_dir = 1;
  string id = 2;
}

message DefaultGlobalConfigDirResponse {
  string path = 1;
}

message SaveAppConfigToDiskRequest {
  string global_config_dir = 1;
  string app_config_json = 2;
}

message GetAppConfigFromDiskRequest {
  /** 为空时使用默认全局配置目录 */
  string global_config_dir = 1;
}

message GetAppConfigFromDiskResponse {
  string app_config_json = 1;
  bool exists = 2;
  string error_message = 3;
}

message ValidateProjectDirectoryRequest {
  string path = 1;
}

message ValidateProjectDirectoryResponse {
  bool is_empty = 1;
  string error_message = 2;
}

message ProjectItem {
  string id = 1;
  string name = 2;
  string project_info = 3;
  string project_type = 4;
  string storage_type = 5;
  string local_path = 6;
  string remote_ip = 7;
  string remote_port = 8;
  string updated_at = 9;
  string config_file_path = 10;
  repeated ProjectTag tags = 11;
}

/** 骨架模板点（归一化 0~1），与项目 JSON / renderer 中 SkeletonTemplateSpec 对应 */
message SkeletonTemplatePointPb {
  string id = 1;
  string label = 2;
  double x = 3;
  double y = 4;
}

message SkeletonTemplateEdgePb {
  string from = 1;
  string to = 2;
}

message SkeletonTemplatePb {
  int32 version = 1;
  repeated SkeletonTemplatePointPb points = 2;
  repeated SkeletonTemplateEdgePb edges = 3;
}

message ProjectTag {
  string name = 1;
  string color = 2;
  /** "plain" | "skeleton"；空或未设置视为 plain */
  string kind = 3;
  SkeletonTemplatePb skeleton_template = 4;
}

message CreateProjectRequest {
  string global_config_dir = 1;
  string name = 2;
  string project_info = 3;
  string project_type = 4;
  string storage_type = 5;
  string local_path = 6;
  string remote_ip = 7;
  string remote_port = 8;
  repeated ProjectTag tags = 9;
}

message CreateProjectResponse {
  ProjectItem project = 1;
  string error_message = 2;
}

message ListProjectsRequest {
  string global_config_dir = 1;
}

message ListProjectsResponse {
  repeated ProjectItem projects = 1;
}

message GetProjectRequest {
  string global_config_dir = 1;
  string id = 2;
}

message GetProjectResponse {
  ProjectItem project = 1;
  bool found = 2;
}

message UpdateProjectRequest {
  string global_config_dir = 1;
  string id = 2;
  string name = 3;
  string project_info = 4;
  repeated ProjectTag tags = 5;
}

message UpdateProjectResponse {
  ProjectItem project = 1;
  bool found = 2;
  string error_message = 3;
}

message DeleteProjectRequest {
  string global_config_dir = 1;
  string id = 2;
}

message DeleteProjectResponse {
  bool found = 1;
  string error_message = 2;
}

message TaskUploadSourceEntry {
  string source_path = 1;
  string file_name = 2;
  bytes content = 3;
}

message SaveTaskFilesRequest {
  string global_config_dir = 1;
  string database_dir = 2;
  string project_id = 3;
  string task_id = 4;
  string subset = 5;
  repeated TaskUploadSourceEntry files = 6;
}

message SaveTaskFilesResponse {
  string error_message = 1;
  repeated string saved_paths = 2;
}

message DefaultDatabaseDirResponse {
  string path = 1;
}

message ListTaskFilesRequest {
  string global_config_dir = 1;
  string project_id = 2;
  string task_id = 3;
  string database_dir = 4;
}

message TaskFileItem {
  string id = 1;
  string project_id = 2;
  string task_id = 3;
  string subset = 4;
  string file_path = 5;
  string created_at = 6;
}

message ListTaskFilesResponse {
  repeated TaskFileItem files = 1;
  string error_message = 2;
}

/** 项目任务列表项（与 renderer TaskItem 对齐，持久化于 global_config_dir/project-tasks/） */
message ProjectTaskItem {
  string id = 1;
  string name = 2;
  string subset = 3;
  int32 file_count = 4;
  string created_at = 5;
  string updated_at = 6;
  string cover_color = 7;
}

message ListProjectTasksRequest {
  string global_config_dir = 1;
  string project_id = 2;
}

message ListProjectTasksResponse {
  repeated ProjectTaskItem tasks = 1;
  string error_message = 2;
}

message SaveProjectTasksRequest {
  string global_config_dir = 1;
  string project_id = 2;
  repeated ProjectTaskItem tasks = 3;
}

message SaveProjectTasksResponse {
  string error_message = 1;
}

/** 项目导出页 Version 配置（JSON 文档，与 renderer ExportVersionDoc 对齐） */
message GetProjectExportVersionsRequest {
  string global_config_dir = 1;
  string project_id = 2;
}

message GetProjectExportVersionsResponse {
  string json_text = 1;
  bool exists = 2;
  string error_message = 3;
}

message SaveProjectExportVersionsRequest {
  string global_config_dir = 1;
  string project_id = 2;
  string json_text = 3;
}

message SaveProjectExportVersionsResponse {
  string error_message = 1;
}

message ReadImageFileRequest {
  string path = 1;
}

message ReadImageFileResponse {
  bytes content = 1;
  string error_message = 2;
}

message ReadImageAnnotationRequest {
  string image_path = 1;
}

message ReadImageAnnotationResponse {
  string json_text = 1;
  bool exists = 2;
  string error_message = 3;
}

message WriteImageAnnotationRequest {
  string image_path = 1;
  string json_text = 2;
}

message WriteImageAnnotationResponse {
  string json_path = 1;
  string error_message = 2;
}

message DeleteImageAnnotationRequest {
  string image_path = 1;
}

message DeleteImageAnnotationResponse {
  string error_message = 1;
}

message DeleteTaskAnnotationsRequest {
  string global_config_dir = 1;
  string project_id = 2;
  string task_id = 3;
  string database_dir = 4;
}

message DeleteTaskAnnotationsResponse {
  string error_message = 1;
}

message GetImageFileInfoRequest {
  string path = 1;
}

message GetImageFileInfoResponse {
  bool exists = 1;
  int64 size_bytes = 2;
  string format = 3;
  int32 channel_count = 4;
  string extension = 5;
  string error_message = 6;
}

message DeleteTaskImageRequest {
  string image_path = 1;
}

message DeleteTaskImageResponse {
  bool deleted = 1;
  bool annotation_deleted = 2;
  string error_message = 3;
}

message DownloadTaskImageRequest {
  string image_path = 1;
}

message DownloadTaskImageResponse {
  bool canceled = 1;
  string saved_path = 2;
  string error_message = 3;
}

message StartDatasetExportRequest {
  string global_config_dir = 1;
  string project_id = 2;
  string task_id = 3;
  string export_format = 4;
  bool keep_project_structure = 5;
  int32 train_boundary = 6;
  int32 val_boundary = 7;
  string version_name = 8;
  repeated TaskNameItem task_names = 9;
}

message TaskNameItem {
  string task_id = 1;
  string task_name = 2;
}

message StartDatasetExportResponse {
  bool canceled = 1;
  string job_id = 2;
  string error_message = 3;
}

message ListExportJobsResponse {
  repeated ExportJobItem jobs = 1;
}

message ExportJobItem {
  string id = 1;
  string project_id = 2;
  string task_id = 3;
  string version_name = 4;
  string export_format = 5;
  bool keep_project_structure = 6;
  string output_dir = 7;
  string status = 8;
  int32 progress = 9;
  string message = 10;
  string created_at = 11;
  string updated_at = 12;
}

/** 从主进程启动便携 Python 后端（Windows：backend 根目录须含 start.ps1 与 python-embed） */
message StartLocalBackendRequest {
  /** 用户选择的 backend 根目录（须含 start.ps1）；空则自动查找 */
  string backend_directory = 1;
}

message StartLocalBackendResponse {
  bool ok = 1;
  string error_message = 2;
  /** 调用前 /health 已可用，未再拉起新进程 */
  bool already_running = 3;
}

/** 结束由本应用主进程 spawn 的本地 FastAPI（uvicorn）子进程；不会结束用户手动启动的同名端口服务 */
message StopLocalBackendResponse {
  /** 是否成功结束了本应用拉起的进程 */
  bool stopped = 1;
  /** stopped=false 时的说明 */
  string message = 2;
}

/** 主进程探测本地 FastAPI /health（避免渲染进程受 CORS / 安全策略影响） */
message LocalBackendStatusResponse {
  bool reachable = 1;
}

service AppService {
  rpc SetTheme(SetThemeRequest) returns (google.protobuf.Empty);
  rpc MinimizeWindow(google.protobuf.Empty) returns (google.protobuf.Empty);
  rpc ToggleMaximizeWindow(google.protobuf.Empty) returns (WindowState);
  rpc CloseWindow(google.protobuf.Empty) returns (google.protobuf.Empty);
  rpc GetWindowState(google.protobuf.Empty) returns (WindowState);
  rpc SelectDirectory(SelectDirectoryRequest) returns (SelectDirectoryResponse);
  rpc SelectFiles(SelectFilesRequest) returns (SelectFilesResponse);
  rpc ValidateProjectDirectory(ValidateProjectDirectoryRequest) returns (ValidateProjectDirectoryResponse);
  rpc CreateProject(CreateProjectRequest) returns (CreateProjectResponse);
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
  rpc GetProject(GetProjectRequest) returns (GetProjectResponse);
  rpc UpdateProject(UpdateProjectRequest) returns (UpdateProjectResponse);
  rpc DeleteProject(DeleteProjectRequest) returns (DeleteProjectResponse);
  rpc SaveTaskFiles(SaveTaskFilesRequest) returns (SaveTaskFilesResponse);
  rpc ListTaskFiles(ListTaskFilesRequest) returns (ListTaskFilesResponse);
  rpc ListProjectTasks(ListProjectTasksRequest) returns (ListProjectTasksResponse);
  rpc SaveProjectTasks(SaveProjectTasksRequest) returns (SaveProjectTasksResponse);
  rpc GetProjectExportVersions(GetProjectExportVersionsRequest) returns (GetProjectExportVersionsResponse);
  rpc SaveProjectExportVersions(SaveProjectExportVersionsRequest) returns (SaveProjectExportVersionsResponse);
  rpc ReadImageFile(ReadImageFileRequest) returns (ReadImageFileResponse);
  rpc ReadImageAnnotation(ReadImageAnnotationRequest) returns (ReadImageAnnotationResponse);
  rpc WriteImageAnnotation(WriteImageAnnotationRequest) returns (WriteImageAnnotationResponse);
  rpc DeleteImageAnnotation(DeleteImageAnnotationRequest) returns (DeleteImageAnnotationResponse);
  rpc DeleteTaskAnnotations(DeleteTaskAnnotationsRequest) returns (DeleteTaskAnnotationsResponse);
  rpc GetImageFileInfo(GetImageFileInfoRequest) returns (GetImageFileInfoResponse);
  rpc DeleteTaskImage(DeleteTaskImageRequest) returns (DeleteTaskImageResponse);
  rpc DownloadTaskImage(DownloadTaskImageRequest) returns (DownloadTaskImageResponse);
  rpc StartDatasetExport(StartDatasetExportRequest) returns (StartDatasetExportResponse);
  rpc ListExportJobs(google.protobuf.Empty) returns (ListExportJobsResponse);
  rpc GetDefaultDatabaseDir(google.protobuf.Empty) returns (DefaultDatabaseDirResponse);
  rpc GetDefaultGlobalConfigDir(google.protobuf.Empty) returns (DefaultGlobalConfigDirResponse);
  rpc SaveAppConfigToDisk(SaveAppConfigToDiskRequest) returns (google.protobuf.Empty);
  rpc GetAppConfigFromDisk(GetAppConfigFromDiskRequest) returns (GetAppConfigFromDiskResponse);
  rpc ListAnnotationProjects(ListAnnotationProjectsRequest) returns (ListAnnotationProjectsResponse);
  rpc UpsertAnnotationProject(UpsertAnnotationProjectRequest) returns (google.protobuf.Empty);
  rpc DeleteAnnotationProject(DeleteAnnotationProjectRequest) returns (google.protobuf.Empty);
  rpc ListAnnotationsByProject(ListAnnotationsByProjectRequest) returns (ListAnnotationsResponse);
  rpc UpsertAnnotation(UpsertAnnotationRequest) returns (google.protobuf.Empty);
  rpc DeleteAnnotation(DeleteAnnotationRequest) returns (google.protobuf.Empty);
  rpc StartLocalBackend(StartLocalBackendRequest) returns (StartLocalBackendResponse);
  rpc StopLocalBackend(google.protobuf.Empty) returns (StopLocalBackendResponse);
  rpc GetLocalBackendStatus(google.protobuf.Empty) returns (LocalBackendStatusResponse);
}
